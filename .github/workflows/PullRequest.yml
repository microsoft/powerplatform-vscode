# CI workflow for PRs and merges to main
# https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions
name: PullRequest

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - "release/stable"
      - "features/PowerPagesAgent"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: List installed .NET SDKs
        run: dotnet --list-sdks

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # - name: Install dependencies
      #   run: npm i -g npm

      - name: Build and unit test
        run: |
          npm ci
          npm run dist
        env:
          AZ_DevOps_Read_PAT: ${{ secrets.AZ_DevOps_Read_PAT }}

      - name: Install xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb x11-xserver-utils

      - name: Run Debugger integration tests
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test-integration

      - name: Run Debugger integration tests
        if: runner.os != 'Linux'
        run: npm run test-integration

      - name: Run Web integration tests
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test-web-integration

      - name: Run Web integration tests
        if: runner.os != 'Linux'
        run: npm run test-web-integration

      - name: Run Desktop integration tests
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test-desktop-int

      - name: Run Desktop integration tests
        if: runner.os != 'Linux'
        run: npm run test-desktop-int

      - name: Run Common integration tests
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test-common-int

      - name: Run Common integration tests
        if: runner.os != 'Linux'
        run: npm run test-common-int

  web-sanity:
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'release/stable'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run dist

      - name: Run E2E web sanity tests
        run: npm run test-e2e-web-sanity
        env:
          CI: true
          PP_TEST_VSCODE_URL: ${{ secrets.PP_TEST_VSCODE_URL }}
          PP_TEST_USERNAME: ${{ secrets.PP_TEST_USERNAME }}
          PP_TEST_PASSWORD: ${{ secrets.PP_TEST_PASSWORD }}

      # Test artifacts are intentionally not uploaded from this job.
      # Playwright reports/traces/videos/screenshots can capture the values that
      # are typed into the login form and the navigated site URL, and uploaded
      # artifacts are not masked by GitHub. Trace/video/screenshot capture is
      # also disabled in CI in the Playwright config. Test results remain visible
      # in the step logs above via the Playwright "list" reporter.
